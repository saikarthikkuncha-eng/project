<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Card Interface</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Header */
header{
    position:sticky;
    top:0;
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
    z-index:1000;
}

/* Card Container */
.container{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:40px;
    flex-wrap:wrap;
}

/* Cards */
.card{
    width:280px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
    position:relative;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

/* Badge */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
    font-weight:bold;
}

/* Card Content */
.card h2{
    margin-bottom:12px;
    color:#111827;
}

.card p{
    color:#555;
    margin-bottom:15px;
    line-height:1.5;
}

.card button{
    padding:10px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.card button:hover{
    background:#1d4ed8;
}

/* Hidden Messages */
.message1{
    visibility:hidden;
    margin-top:15px;
    color:green;
    font-weight:bold;
}

.card:hover .message1{
    visibility:visible;
}

.message2{
    display:none;
    margin-top:15px;
    color:#e11d48;
    font-weight:bold;
}

.card:hover .message2{
    display:block;
}

/* Fixed Help Button */
.help-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#16a34a;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.help-btn:hover{
    background:#15803d;
}
</style>
</head>

<body>

<header>
    Notification Center
</header>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <div class="badge">1</div>
        <h2>Email Alert</h2>
        <p>You have received a new email from admin.</p>
        <button>Open</button>
        <div class="message1">New Notification!</div>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <div class="badge">2</div>
        <h2>System Update</h2>
        <p>Your device update is ready to install.</p>
        <button>Install</button>
        <div class="message2">New Notification!</div>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <div class="badge">3</div>
        <h2>Reminder</h2>
        <p>Your meeting starts in 30 minutes.</p>
        <button>View</button>
        <div class="message1">New Notification!</div>
    </div>

</div>

<button class="help-btn">Help</button>

</body>
</html>
